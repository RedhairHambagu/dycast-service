version: '3.8'

services:
  dycast:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_ADMIN_SALT=${VITE_ADMIN_SALT}
        - VITE_ADMIN_HASH=${VITE_ADMIN_HASH}
        - VITE_LOGIN_URL=${VITE_LOGIN_URL:-/login}
    container_name: dycast-app
    ports:
      - "18080:80"
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    networks:
      - dycast-network

networks:
  dycast-network:
    driver: bridge
